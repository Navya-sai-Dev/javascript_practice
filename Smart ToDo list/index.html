<!DOCTYPE html>
<html>
<head>
<title>Smart To-Do List</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
<div class="header">
<div class="title">
<h2>Smart To-Do List</h2>
<p>Organize, prioritize and get things done!</p>
</div>
</div>
<div class="input-section">
<input type="text" id="taskInput" placeholder="What's on your mind?">
<input type="date" id="dateInput">
<button id="addTask">Add Task +</button>
</div>
<div class="filters">
<button class="filter-btn active" data-filter="all">All</button>
<button class="filter-btn" data-filter="pending">Pending</button>
<button class="filter-btn" data-filter="completed">Completed</button>
<button class="filter-btn" data-filter="today">Today</button>
<button class="filter-btn" data-filter="important">Important</button>
</div>
<div class="task-list" id="taskList">
</div>
<div class="footer">
<p>Total: <span id="totalTasks">0</span></p>
<p>Completed: <span id="completedTasks">0</span></p>
<p>Pending: <span id="pendingTasks">0</span></p>
<p class="motivation">Stay productive 🚀 Keep going!!! you are doing great!</p>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
