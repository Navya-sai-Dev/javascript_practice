<!DOCTYPE html>
<html>
<head>
    <title>Even Odd Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="checker">

        <h2>Even or Odd Checker</h2>

        <input 
            type="number" 
            id="numberInput" 
            placeholder="Enter a number"
        >

        <button id="checkBtn">Check</button>

        <p id="result">Enter a number 👀</p>

    </div>

    <script src="script.js"></script>
</body>
</html>
