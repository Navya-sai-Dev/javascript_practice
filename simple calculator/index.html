<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <title>Cutie Calculator</title>
</head>
<body>
  <div class="calculator">
 <div class="display" style="height 100px"; border:1px solid black;>
   0
  </div>
  <div class="buttons">
    <button>7</button>
    <button>8</button>
    <button>9</button>
    <button class="operator">÷</button>
    <br>
     

    <button>4</button>
     <button>5</button>
     <button>6</button>
      <button class="operator">×</button>
      <br>

     <button>1</button>
      <button>2</button>
      <button>3</button>
      <button class="operator">-</button>
        <br>
       <button>0</button>
       <button class="point">.</button>
       <button class="equals">=</button>
        <button class="operator">+</button>
         <br>

        <button class="clear">C</button>
           </div>
          </div> 
      
  <script src="script.js"></script>

</html>
